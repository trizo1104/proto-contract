syntax = "proto3";

package wms;

option java_multiple_files = true;
option java_package = "com.trizo1104.wms.proto";
option java_outer_classname = "ProductMessageProto";

message Product {
  string id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  string unit = 5;
  string barcode = 6;
  string status = 7;
  string created_at = 8;
  string updated_at = 9;
}

message CreateProductRequest {
  string sku = 1;
  string name = 2;
  string description = 3;
  string unit = 4;
  string barcode = 5;
  string status = 6;
}

message GetProductByIdRequest {
  string id = 1;
}

message GetProductBySkuRequest {
  string sku = 1;
}

message UpdateProductRequest {
  string id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  string unit = 5;
  string barcode = 6;
  string status = 7;
}

message DeleteProductRequest {
  string id = 1;
}

message DeleteProductResponse {
  bool success = 1;
  string message = 2;
}

message ProductResponse {
  Product product = 1;
}

message ListProductsRequest {
  int32 page = 1;
  int32 limit = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
  int64 total = 2;
}
