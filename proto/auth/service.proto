syntax = "proto3";

package auth;

option java_multiple_files = true;
option java_package = "com.trizo1104.auth.proto";
option java_outer_classname = "AuthServiceProto";

import "auth/auth_message.proto";
import "auth/permission_message.proto";
import "auth/role_message.proto";
import "auth/user_message.proto";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Me(MeRequest) returns (MeResponse);

  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc GetUserById(GetUserByIdRequest) returns (UserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc AssignRoleToUser(AssignRoleToUserRequest) returns (AssignRoleToUserResponse);
  rpc RemoveRoleFromUser(RemoveRoleFromUserRequest) returns (RemoveRoleFromUserResponse);

  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (GetUserPermissionsResponse);
}
