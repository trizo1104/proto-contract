syntax = "proto3";

package auth;

option java_multiple_files = true;
option java_package = "com.trizo1104.auth.proto";
option java_outer_classname = "RoleMessageProto";

import "auth/permission_message.proto";

message Role {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  repeated Permission permissions = 5;
}

message ListRolesRequest {}

message ListRolesResponse {
  repeated Role roles = 1;
}

message RoleResponse {
  Role role = 1;
}

message AssignRoleToUserRequest {
  string user_id = 1;
  string role_id = 2;
}

message AssignRoleToUserResponse {
  bool success = 1;
  string message = 2;
}

message RemoveRoleFromUserRequest {
  string user_id = 1;
  string role_id = 2;
}

message RemoveRoleFromUserResponse {
  bool success = 1;
  string message = 2;
}

message AssignPermissionToRoleRequest {
  string role_id = 1;
  string permission_id = 2;
}

message RemovePermissionFromRoleRequest {
  string role_id = 1;
  string permission_id = 2;
}

message UpdateRolePermissionsRequest {
  string role_id = 1;
  repeated string permission_ids = 2;
}

message GetRolePermissionsRequest {
  string role_id = 1;
}
