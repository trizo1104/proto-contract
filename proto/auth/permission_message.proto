syntax = "proto3";

package auth;

option java_multiple_files = true;
option java_package = "com.trizo1104.auth.proto";
option java_outer_classname = "PermissionMessageProto";

message Permission {
  string id = 1;
  string code = 2;
  string module = 3;
  string description = 4;
}

message GetUserPermissionsRequest {
  string user_id = 1;
}

message GetUserPermissionsResponse {
  repeated Permission permissions = 1;
}
