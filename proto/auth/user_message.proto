syntax = "proto3";

package auth;

option java_multiple_files = true;
option java_package = "com.trizo1104.auth.proto";
option java_outer_classname = "UserMessageProto";

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  INACTIVE = 2;
  LOCKED = 3;
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string phone = 4;
  string status = 5;
  repeated string roles = 6;
  repeated string permissions = 7;
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string phone = 4;
}

message UpdateUserRequest {
  string id = 1;
  string email = 2;
  string phone = 3;
  UserStatus status = 4;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message GetUserByIdRequest {
  string id = 1;
}

message UserResponse {
  User user = 1;
}

message ListUsersRequest {
  int32 page = 1;
  int32 size = 2;
  string keyword = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  int64 total = 2;
}