syntax = "proto3";

package auth;

option java_multiple_files = true;
option java_package = "com.trizo1104.auth.proto";
option java_outer_classname = "AuthProto";

import "google/protobuf/timestamp.proto";

service AuthService {

// ==================================================
// AUTHENTICATION
// ==================================================

rpc Login(LoginRequest)
returns (LoginResponse);

rpc ValidateToken(ValidateTokenRequest)
returns (ValidateTokenResponse);

rpc Me(MeRequest)
returns (MeResponse);

// ==================================================
// USER MANAGEMENT
// ==================================================

rpc CreateUser(CreateUserRequest)
returns (UserResponse);

rpc GetUserById(GetUserByIdRequest)
returns (UserResponse);

rpc UpdateUser(UpdateUserRequest)
returns (UserResponse);

rpc DeleteUser(DeleteUserRequest)
returns (DeleteUserResponse);

rpc ListUsers(ListUsersRequest)
returns (ListUsersResponse);

// ==================================================
// ROLE MANAGEMENT
// ==================================================

rpc ListRoles(ListRolesRequest)
returns (ListRolesResponse);

rpc AssignRoleToUser(
AssignRoleToUserRequest)
returns (AssignRoleToUserResponse);

rpc RemoveRoleFromUser(
RemoveRoleFromUserRequest)
returns (RemoveRoleFromUserResponse);

// ==================================================
// PERMISSION
// ==================================================

rpc GetUserPermissions(
GetUserPermissionsRequest)
returns (GetUserPermissionsResponse);
}

// ==================================================
// ENUMS
// ==================================================

enum UserStatus {
USER_STATUS_UNSPECIFIED = 0;
ACTIVE = 1;
INACTIVE = 2;
LOCKED = 3;
}

// ==================================================
// DOMAIN OBJECTS
// ==================================================

message Permission {

string id = 1;

string code = 2;

string module = 3;

string description = 4;
}

message Role {

string id = 1;

string code = 2;

string name = 3;

string description = 4;

repeated Permission permissions = 5;
}

message User {

string id = 1;

string username = 2;

string email = 3;

string full_name = 4;

string phone = 5;

UserStatus status = 6;

repeated Role roles = 7;

google.protobuf.Timestamp created_at = 8;

google.protobuf.Timestamp updated_at = 9;
}

// ==================================================
// AUTH
// ==================================================

message LoginRequest {

string username = 1;

string password = 2;
}

message LoginResponse {

bool success = 1;

string message = 2;

string access_token = 3;
}

message ValidateTokenRequest {}

message ValidateTokenResponse {

bool valid = 1;

string user_id = 2;

string username = 3;

repeated string roles = 4;

repeated string permissions = 5;
}

message MeRequest {}

message MeResponse {

User user = 1;
}

// ==================================================
// USER
// ==================================================

message CreateUserRequest {

string username = 1;

string email = 2;

string password = 3;

string full_name = 4;

string phone = 5;
}

message UpdateUserRequest {

string id = 1;

string email = 2;

string full_name = 3;

string phone = 4;

UserStatus status = 5;
}

message DeleteUserRequest {

string id = 1;
}

message DeleteUserResponse {

bool success = 1;

string message = 2;
}

message GetUserByIdRequest {

string id = 1;
}

message UserResponse {

User user = 1;
}

message ListUsersRequest {

int32 page = 1;

int32 size = 2;

string keyword = 3;
}

message ListUsersResponse {

repeated User users = 1;

int64 total = 2;
}

// ==================================================
// ROLE
// ==================================================

message ListRolesRequest {}

message ListRolesResponse {

repeated Role roles = 1;
}

message AssignRoleToUserRequest {

string user_id = 1;

string role_id = 2;
}

message AssignRoleToUserResponse {

bool success = 1;

string message = 2;
}

message RemoveRoleFromUserRequest {

string user_id = 1;

string role_id = 2;
}

message RemoveRoleFromUserResponse {

bool success = 1;

string message = 2;
}

// ==================================================
// PERMISSION
// ==================================================

message GetUserPermissionsRequest {

string user_id = 1;
}

message GetUserPermissionsResponse {

repeated Permission permissions = 1;
}
